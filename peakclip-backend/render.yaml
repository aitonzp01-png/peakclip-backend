services:
  - type: web
    name: peakclip-backend
    env: docker
    repo: https://github.com/aitonzp01-png/peakclipnuevo
    dockerfilePath: ./peakclip-backend/Dockerfile
    dockerContext: ./peakclip-backend
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: PUBLIC_URL
        value: https://peakclip-backend.onrender.com
      - key: FRONTEND_URL
        value: https://peakclip-app.vercel.app
      - key: NEXT_PUBLIC_BACKEND_URL
        value: https://peakclip-backend.onrender.com
